services:
  scholarius:
    build: .
    container_name: scholarius
    
    # Port mapping
    ports:
      - "8000:8000"
    
    # Persistent volumes
    volumes:
      # Persist app directory (includes database and certificates)
      - ./app:/app/app
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - SCHOLARIUS_SSL_HOST=${SCHOLARIUS_SSL_HOST:-192.168.150.83}
    
    # Restart policy
    restart: unless-stopped
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
