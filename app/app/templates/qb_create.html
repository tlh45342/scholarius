<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Question Bank - Scholarius</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-theme="{{ theme|default('system') }}">
<main class="container card-with-corner">
    <h1>Create Question Bank</h1>
    <p>Create the bank first, then add its questions from the editor.</p>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form action="/qb-manage/create" method="post">
        <div class="form-group">
            <label for="identifier">Bank identifier</label>
            <input id="identifier" name="identifier" required maxlength="80"
                   pattern="[A-Za-z0-9][A-Za-z0-9._-]{0,79}"
                   placeholder="az900-practice">
            <small>A stable machine-readable identifier. Letters, numbers, dots, dashes, and underscores.</small>
        </div>
        <div class="form-group">
            <label for="title">Bank title</label>
            <input id="title" name="title" required maxlength="160"
                   placeholder="AZ-900 Practice Bank">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4"
                      placeholder="Optional notes about this bank"></textarea>
        </div>
        <button class="button button-primary button-space" type="submit">Create Bank</button>
    </form>

    <a class="card-corner-icon" href="/qb-manage" aria-label="Back to question bank management" title="Back">‹</a>
</main>
{% include "_corner_nav.html" %}
</body>
</html>
