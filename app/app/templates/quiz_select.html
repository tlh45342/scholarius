<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Quiz - Scholarius</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-theme="{{ theme|default('system') }}">

<main class="container card-with-corner">
    <h1>Select a Quiz</h1>
    <p>Choose the quiz or test bank you want to use.</p>

    <div class="menu">
        {% for quiz_id, title in quizzes.items() %}
        <a class="button button-primary" href="/action?quiz_id={{ quiz_id }}">
            {{ title }}
        </a>
        {% else %}
        <div class="alert alert-error">
            No question banks are installed yet.
        </div>
        {% endfor %}
    </div>

    <a class="card-corner-icon" href="/"
       aria-label="Home" title="Home">⌂</a>
</main>

{% include "_corner_nav.html" %}
</body>
</html>
