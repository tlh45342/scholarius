<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarius</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="home-page">

<main class="home-shell">
    <section class="home-card" aria-labelledby="home-title">
        <h1 id="home-title">Scholarius</h1>
        <p class="home-subtitle">
            Personal quizzes, tests, and focused review.
        </p>

        <nav class="home-actions" aria-label="Scholarius actions">
            <a class="home-button home-button-primary" href="/quiz-select">
                Take Quiz / Test
            </a>

            <a class="home-button home-button-secondary" href="/qb-manage">
                Question Bank Management
            </a>

            <a class="home-button home-button-secondary" href="/history">
                View History
            </a>

            <a class="home-button home-button-secondary" href="/admin">
                Admin
            </a>
        </nav>

        {% if username %}
        <p class="home-user">Signed in as {{ username }}</p>
        {% endif %}
    </section>
</main>

<a
    class="settings-button"
    href="/profile"
    aria-label="Open profile and settings"
    title="Profile and settings"
>⚙</a>

</body>
</html>
