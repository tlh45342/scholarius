<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarius</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="home-page">
<main class="home-shell">
    <section class="home-card" aria-labelledby="home-title">
        <h1 id="home-title">Scholarius</h1>
        <p class="home-subtitle">Personal quizzes, tests, and focused review.</p>
        <nav class="home-actions" aria-label="Scholarius actions">
            <a class="home-button home-button-primary" href="/quiz-select">Take Quiz / Test</a>
            {% if is_admin %}
            <a class="home-button home-button-secondary" href="/qb-manage">Question Bank Management</a>
            {% endif %}
            <a class="home-button home-button-secondary" href="/history">View History</a>
        </nav>
        <p class="home-user">Signed in as {{ display_name }}</p>
    </section>
</main>
{% set show_home = false %}
{% include "_corner_nav.html" %}
</body>
</html>
