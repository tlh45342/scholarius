<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create Profile - Scholarius</title><link rel="stylesheet" href="/static/style.css"></head>
<body><main class="container auth-container"><h1>Create Profile</h1><p>Create a normal study profile. Administrator privileges are not granted here.</p>
{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
<form action="/register" method="post">
<div class="form-group"><label for="display_name">Display name</label><input id="display_name" name="display_name" autocomplete="name"></div>
<div class="form-group"><label for="username">Username</label><input id="username" name="username" autocomplete="username" required></div>
<div class="form-group"><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="new-password" minlength="10" required><small>Use at least 10 characters.</small></div>
<div class="form-group"><label for="confirm_password">Confirm password</label><input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" minlength="10" required></div>
<div class="form-group"><label for="theme">Appearance</label><select id="theme" name="theme"><option value="light">Light</option><option value="dark">Dark</option></select></div>
<button class="button button-primary button-space" type="submit">Create Profile</button></form>
<a class="back" href="/login">Back to login</a><p class="version-note">Scholarius {{ version }}</p></main></body></html>
