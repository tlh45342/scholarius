<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create Question Bank - Scholarius</title><link rel="stylesheet" href="/static/style.css"></head><body data-theme="{{ theme|default('system') }}"><main class="container card-with-corner"><h1>Create Question Bank</h1><div class="wizard-steps"><span class="{% if step==1 %}active{% endif %}">1 Identity</span><span class="{% if step==2 %}active{% endif %}">2 Details</span><span class="{% if step==3 %}active{% endif %}">3 Test Defaults</span></div>
{% if step == 1 %}<form action="/qb-manage/create/step/2" method="get" class="stacked-form"><label>Bank Name<input name="title" required placeholder="AZ-900 Master Question Bank"></label><label>Bank Identifier<input name="bank_id" required pattern="[A-Za-z0-9][A-Za-z0-9_-]{1,63}" placeholder="AZ900"></label><button class="button button-primary">Next</button></form>
{% elif step == 2 %}<form action="/qb-manage/create/step/3" method="get" class="stacked-form"><input type="hidden" name="title" value="{{ request.query_params.get('title','') }}"><input type="hidden" name="bank_id" value="{{ request.query_params.get('bank_id','') }}"><label>Description<textarea name="description" rows="5"></textarea></label><label>Author<input name="author"></label><label>Version<input name="bank_version" value="1.0"></label><button class="button button-primary">Next</button></form>
{% else %}<form action="/qb-manage/create/finish" method="post" class="stacked-form">{% for key in ['title','bank_id','description','author','bank_version'] %}<input type="hidden" name="{{ key }}" value="{{ request.query_params.get(key,'') }}">{% endfor %}<label>Default Test Name<input name="default_test_name" value="{{ request.query_params.get('title','') }}"></label><label>Test Description<textarea name="test_description" rows="3"></textarea></label><div class="form-grid"><label>Time Limit (minutes)<input type="number" min="1" name="time_limit_minutes"></label><label>Question Count<input type="number" min="1" name="default_test_question_count"></label><label>Passing Score (%)<input type="number" min="0" max="100" name="passing_score_percent" value="80" required></label></div><label class="check-row"><input type="checkbox" name="shuffle_questions" checked> Shuffle questions</label><label class="check-row"><input type="checkbox" name="shuffle_choices" checked> Shuffle answer choices</label><label class="check-row"><input type="checkbox" name="allow_review" checked> Allow review</label><label>Show explanations<select name="show_explanations"><option value="quiz-only">Quiz mode only</option><option value="after-submit">After submission</option><option value="never">Never</option></select></label><button class="button button-primary">Create Bank</button></form>{% endif %}<a class="card-corner-icon" href="/qb-manage">‹</a></main>{% include "_corner_nav.html" %}</body></html>
