<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bank Details - Scholarius</title><link rel="stylesheet" href="/static/style.css"></head><body data-theme="{{ theme|default('system') }}"><main class="container card-with-corner"><h1>Bank Details</h1><p>These values are stored in the authoritative XML bank.</p>{% if message %}<div class="alert alert-success">{{ message }}</div>{% endif %}<form method="post" class="stacked-form"><label>Bank Identifier<input value="{{ bank.bank_id }}" disabled></label><label>Bank Name<input name="title" value="{{ bank.title }}" required></label><label>Description<textarea name="description" rows="5">{{ metadata.get('description','') }}</textarea></label><label>Author<input name="author" value="{{ metadata.get('author','') }}"></label><label>Version<input name="bank_version" value="{{ metadata.get('bank_version','1.0') }}"></label><button class="button button-primary" type="submit">Save to XML</button></form><a class="card-corner-icon" href="/qb-manage/bank/{{ bank.bank_id }}/manage">‹</a></main>{% include "_corner_nav.html" %}</body></html>
