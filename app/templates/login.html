<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login - Scholarius</title><link rel="stylesheet" href="/static/style.css"></head>
<body><main class="container auth-container"><h1>Scholarius</h1><p>Sign in to continue.</p>
{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
<form action="/auth/login" method="post">
<div class="form-group"><label for="username">Username</label><input id="username" name="username" autocomplete="username" required autofocus></div>
<div class="form-group"><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required></div>
<button class="button button-primary button-space" type="submit">Sign In</button>
</form>
<a class="back" href="/register">Create a personal profile</a><p class="version-note">Scholarius {{ version }}</p></main></body></html>
