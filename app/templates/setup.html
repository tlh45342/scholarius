<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>First Setup - Scholarius</title><link rel="stylesheet" href="/static/style.css"></head>
<body><main class="container auth-container"><h1>Scholarius Setup</h1><p>Create the first administrator. This page is disabled after the first account is created.</p>
{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
<form action="/setup/create-admin" method="post">
<div class="form-group"><label for="display_name">Display name</label><input id="display_name" name="display_name" autocomplete="name"></div>
<div class="form-group"><label for="username">Administrator username</label><input id="username" name="username" autocomplete="username" required autofocus></div>
<div class="form-group"><label for="password">Administrator password</label><input id="password" name="password" type="password" autocomplete="new-password" minlength="10" required><small>Use at least 10 characters and avoid a reused password.</small></div>
<div class="form-group"><label for="confirm_password">Confirm password</label><input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" minlength="10" required></div>
<button class="button button-primary button-space" type="submit">Create Administrator</button></form><p class="version-note">Scholarius {{ version }}</p></main></body></html>
