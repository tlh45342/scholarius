<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Test Settings - Scholarius</title><link rel="stylesheet" href="/static/style.css"></head><body data-theme="{{ theme|default('system') }}"><main class="container card-with-corner"><h1>Default Test Settings</h1><p>These defaults can later be overridden by named Test Versions.</p>{% if message %}<div class="alert alert-success">{{ message }}</div>{% endif %}<form method="post" class="stacked-form"><label>Default Test Name<input name="default_test_name" value="{{ metadata.get('default_test_name', bank.title) }}"></label><label>Test Description<textarea name="test_description" rows="4">{{ metadata.get('test_description','') }}</textarea></label><div class="form-grid"><label>Time Limit (minutes)<input type="number" min="1" name="time_limit_minutes" value="{{ metadata.get('time_limit_minutes','') }}" placeholder="No limit"></label><label>Default Question Count<input type="number" min="1" name="default_test_question_count" value="{{ metadata.get('default_test_question_count','') }}" placeholder="Entire bank"></label><label>Passing Score (%)<input type="number" min="0" max="100" name="passing_score_percent" value="{{ metadata.get('passing_score_percent','80') }}" required></label></div><label class="check-row"><input type="checkbox" name="shuffle_questions" {% if metadata.get('shuffle_questions','true') == 'true' %}checked{% endif %}> Shuffle questions</label><label class="check-row"><input type="checkbox" name="shuffle_choices" {% if metadata.get('shuffle_choices','true') == 'true' %}checked{% endif %}> Shuffle answer choices</label><label class="check-row"><input type="checkbox" name="allow_review" {% if metadata.get('allow_review','true') == 'true' %}checked{% endif %}> Allow question review</label><label>Show explanations<select name="show_explanations"><option value="quiz-only" {% if metadata.get('show_explanations','quiz-only') == 'quiz-only' %}selected{% endif %}>Quiz mode only</option><option value="after-submit" {% if metadata.get('show_explanations') == 'after-submit' %}selected{% endif %}>After submission</option><option value="never" {% if metadata.get('show_explanations') == 'never' %}selected{% endif %}>Never</option></select></label><button class="button button-primary" type="submit">Save to XML</button></form><a class="card-corner-icon" href="/qb-manage/bank/{{ bank.bank_id }}/manage">‹</a></main>{% include "_corner_nav.html" %}</body></html>
