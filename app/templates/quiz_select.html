<!DOCTYPE html>
<html>
<head>
    <title>Select Quiz - Scholarius</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Select a Quiz</h1>
    <p>Choose a quiz to begin:</p>

    <div class="menu">

        {% endfor %}
    </div>

    <a class="back" href="/">Back to Home</a>
</div>

{% include "_corner_nav.html" %}
</body>
</html>
