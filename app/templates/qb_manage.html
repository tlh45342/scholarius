<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank Management - Scholarius</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-theme="{{ theme|default('system') }}">

<main class="container card-with-corner">
    <h1>Question Bank Management</h1>
    <p>Choose the question bank task you want to perform.</p>

    {% if message %}
    <div class="alert alert-success">{{ message }}</div>
    {% endif %}

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <nav class="management-launcher" aria-label="Question bank tasks">
        <a class="button button-primary" href="/qb-manage/banks">
            List
        </a>

        <a class="button button-primary" href="/qb-manage/import">
            Import
        </a>

        <a class="button button-primary" href="/qb-manage/export">
            Export
        </a>

        <a class="button button-primary" href="/qb-manage/create">
            Create
        </a>

        <a class="button button-primary" href="/qb-manage/edit">
            Edit
        </a>
    </nav>

    <a class="card-corner-icon" href="/"
       aria-label="Home" title="Home">⌂</a>
</main>

{% include "_corner_nav.html" %}
</body>
</html>
